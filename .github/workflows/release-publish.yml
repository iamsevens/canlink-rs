name: Release Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (example: 0.2.0)"
        required: true
        type: string
      confirm:
        description: "Type publish to continue"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CANLINK_TSCAN_ALLOW_MISSING_BUNDLE: "1"

jobs:
  publish:
    name: Publish to crates.io
    runs-on: windows-latest
    timeout-minutes: 90
    environment: crates-io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Guard vendor bundles
        run: python scripts/guard_vendor_bundle.py

      - name: Validate inputs
        shell: powershell
        run: |
          if ("${{ github.event.inputs.confirm }}" -ne "publish") {
            throw "confirm must be 'publish'"
          }

      - name: Validate cargo token
        shell: powershell
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CARGO_REGISTRY_TOKEN)) {
            throw "CARGO_REGISTRY_TOKEN is required"
          }

      - name: Publish crates in order
        shell: powershell
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: |
          function Get-CrateVersion([string]$crate, [string]$version) {
            try {
              $resp = Invoke-RestMethod -UseBasicParsing "https://crates.io/api/v1/crates/$crate" -TimeoutSec 15
              return ($resp.versions | Where-Object { $_.num -eq $version })
            } catch {
              return $null
            }
          }

          function Wait-ForCrateVersion([string]$crate, [string]$version) {
            for ($i = 0; $i -lt 60; $i++) {
              $found = Get-CrateVersion $crate $version
              if ($found) {
                Write-Host "$crate $version is indexed."
                return
              }
              Start-Sleep -Seconds 20
            }
            throw "Timeout waiting for $crate $version to be indexed on crates.io"
          }

          function Publish-IfMissing([string]$crate, [bool]$noVerify = $false) {
            $found = Get-CrateVersion $crate $env:RELEASE_VERSION
            if ($found) {
              Write-Host "[SKIP] $crate $env:RELEASE_VERSION already indexed."
              return
            }
            if ($noVerify) {
              cargo publish -p $crate --locked --no-verify
            } else {
              cargo publish -p $crate --locked
            }
            Wait-ForCrateVersion $crate $env:RELEASE_VERSION
          }

          Publish-IfMissing "canlink-hal"
          Publish-IfMissing "canlink-tscan-sys"
          Publish-IfMissing "canlink-tscan" $true
          Publish-IfMissing "canlink-cli" $true
