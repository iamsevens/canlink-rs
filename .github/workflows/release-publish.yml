name: Release Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (example: 0.2.0)"
        required: true
        type: string
      confirm:
        description: "Type publish to continue"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CANLINK_TSCAN_BUNDLE_DIR: ${{ github.workspace }}\docs\vendor\tsmaster\examples\LibTSCAN\lib_extracted\lib\lib\windows\x64

jobs:
  publish:
    name: Publish to crates.io
    runs-on: windows-latest
    timeout-minutes: 90
    environment: crates-io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate inputs
        shell: powershell
        run: |
          if ("${{ github.event.inputs.confirm }}" -ne "publish") {
            throw "confirm must be 'publish'"
          }

      - name: Validate cargo token
        shell: powershell
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CARGO_REGISTRY_TOKEN)) {
            throw "CARGO_REGISTRY_TOKEN is required"
          }

      - name: Publish crates in order
        shell: powershell
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: |
          function Wait-ForCrateVersion([string]$crate, [string]$version) {
            for ($i = 0; $i -lt 30; $i++) {
              $line = cargo search $crate --limit 1
              if ($LASTEXITCODE -eq 0) {
                $escapedCrate = [regex]::Escape($crate)
                $escapedVersion = [regex]::Escape($version)
                if ($line -match "^$escapedCrate\\s*=\\s*`"$escapedVersion`"") {
                  Write-Host "$crate $version is indexed."
                  return
                }
              }
              Start-Sleep -Seconds 20
            }
            throw "Timeout waiting for $crate $version to be indexed on crates.io"
          }

          cargo publish -p canlink-hal --locked
          Wait-ForCrateVersion "canlink-hal" $env:RELEASE_VERSION

          cargo publish -p canlink-mock --locked
          Wait-ForCrateVersion "canlink-mock" $env:RELEASE_VERSION

          cargo publish -p canlink-tscan-sys --locked
          Wait-ForCrateVersion "canlink-tscan-sys" $env:RELEASE_VERSION

          cargo publish -p canlink-tscan --locked --no-verify
          Wait-ForCrateVersion "canlink-tscan" $env:RELEASE_VERSION

          cargo publish -p canlink-cli --locked --no-verify
