name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CANLINK_TSCAN_ALLOW_MISSING_BUNDLE: 1

jobs:
  windows-quality:
    name: Windows Quality Gate
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check rustfmt
        run: cargo fmt --all -- --check

      - name: Check clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build (Check-Only)
        run: cargo check --workspace --all-targets --all-features

      - name: Test (Non-TSMaster)
        run: cargo test -p canlink-hal -p canlink-mock --all-features

      - name: Doc test (Non-TSMaster)
        run: cargo test -p canlink-hal -p canlink-mock --doc --all-features

      - name: Build docs
        run: cargo doc --no-deps --all-features --document-private-items

      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Check docs coverage
        run: python scripts/check_doc_coverage.py
